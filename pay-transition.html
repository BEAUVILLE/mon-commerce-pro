<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>POS vers PAY</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0b5f34">
<style>
*{box-sizing:border-box}body{margin:0;min-height:100dvh;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(720px 380px at 8% -10%,rgba(34,197,94,.28),transparent 62%),linear-gradient(180deg,#0b5f34,#04130d);color:white;padding:10px;font-weight:900}a{color:inherit;text-decoration:none}button,input,textarea{font:inherit}.wrap{width:min(880px,100%);margin:auto}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}.top b{color:#fff3cf}.top a{font-size:12px;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 10px;background:rgba(255,255,255,.08)}.box{border:1px solid rgba(246,196,83,.36);border-radius:22px;background:rgba(255,255,255,.07);padding:14px;box-shadow:0 18px 44px rgba(0,0,0,.24)}h1{font-size:clamp(38px,11vw,72px);line-height:.88;letter-spacing:-.07em;margin:4px 0 10px}.gold{color:#f6c453}.lead{font-size:14px;line-height:1.38;color:rgba(255,255,255,.82);margin:0 0 10px}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.card{border:1px solid rgba(246,196,83,.22);border-radius:18px;background:#06140f;padding:12px}.card small{display:block;color:#fff3cf;font-size:11px;text-transform:uppercase;letter-spacing:.08em}.card b{display:block;margin-top:4px;font-size:22px}.rows{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.18);border-radius:16px;padding:11px}.row strong{display:block;color:#fff}.row span{display:block;color:rgba(255,255,255,.72);font-size:12px;margin-top:2px}.amount{font-size:18px;color:#f6c453;font-weight:1000}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{min-height:50px;border-radius:15px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:white;padding:8px;font-size:12px;font-weight:1000;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer}.main{background:linear-gradient(135deg,#bbf7d0,#22c55e,#f6c453);color:#06140f}.goldBtn{background:linear-gradient(135deg,#fff1bd,#f6c453);color:#06140f}.status{margin-top:9px;border:1px dashed rgba(246,196,83,.28);border-radius:14px;background:rgba(0,0,0,.16);padding:9px;font-size:12.5px;color:#dfffe9;line-height:1.32}textarea{width:100%;min-height:86px;margin-top:10px;border-radius:16px;border:1px solid rgba(246,196,83,.28);background:#06140f;color:white;padding:12px;font-weight:850;resize:vertical}@media(max-width:560px){.kpi,.actions{grid-template-columns:1fr}.row{grid-template-columns:1fr}.amount{text-align:left}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top"><b>🧾 POS → PAY</b><a href="./caisse.html">← Caisse POS</a></div>
  <section class="box">
    <h1>Clôture caisse.<br><span class="gold">PAY reçoit l’argent.</span></h1>
    <p class="lead">POS garde les tickets, articles, quantités et stock. PAY reçoit seulement la recette finale de clôture : total ou détail par mode de paiement.</p>
    <div class="kpi"><div class="card"><small>Date</small><b id="dateBox">—</b></div><div class="card"><small>Total</small><b id="totalBox">0 F</b></div></div>
    <textarea id="noteBox"></textarea>
    <div class="actions"><button class="btn main" id="sendTotal" type="button">💳 Envoyer total POS vers PAY</button><button class="btn goldBtn" id="copy" type="button">📋 Copier clôture</button></div>
    <div class="rows" id="rowsBox"></div>
    <div class="status" id="status">Pont POS prêt. Choisis total consolidé ou un mode séparé.</div>
  </section>
</main>
<script>
(function(){
'use strict';
const PAY_URL='https://pro-pay.digiylyfe.com/module-bridge.html';
const $=id=>document.getElementById(id);
const q=new URLSearchParams(location.search);
function num(v){return Number(String(v||'0').replace(/[^0-9]/g,''))||0}
function money(n){return (Number(n)||0).toLocaleString('fr-FR')+' F'}
function set(msg){$('status').textContent=msg}
const closure={from:'POS',date:q.get('date')||new Date().toISOString().slice(0,10),closureRef:q.get('closureRef')||('POS-CLOTURE-'+Date.now()),count:num(q.get('count')),cash:num(q.get('cash')),wave:num(q.get('wave')),orange:num(q.get('orange')),card:num(q.get('card')),other:num(q.get('other')),total:num(q.get('total'))};
if(!closure.total) closure.total=closure.cash+closure.wave+closure.orange+closure.card+closure.other;
const modes=[['Cash','cash',closure.cash],['Wave','wave',closure.wave],['Orange Money','orange',closure.orange],['Carte','card',closure.card],['Autres','other',closure.other]];
function channelLabel(key){if(key==='cash')return'Cash';if(key==='wave')return'Wave';if(key==='orange')return'Orange Money';if(key==='card')return'Carte';return'Autre'}
function noteTotal(){return 'Clôture caisse POS '+closure.date+' — '+closure.count+' vente(s) — Cash '+money(closure.cash)+' · Wave '+money(closure.wave)+' · Orange '+money(closure.orange)+' · Carte '+money(closure.card)+' · Autres '+money(closure.other)+' — Total '+money(closure.total)}
function buildUrl(amount,channel,label){const p=new URLSearchParams();p.set('from','POS');p.set('type','income');p.set('amount',String(Math.round(Number(amount)||0)));p.set('channel',channelLabel(channel));p.set('who','MON COMMERCE POS');p.set('category',label||'Clôture caisse POS');p.set('note',label+' · '+noteTotal());p.set('proofRef',(closure.closureRef||'POS-CLOTURE')+'-'+channel+'-'+Date.now());return PAY_URL+'?'+p.toString()}
function saveLocal(amount,channel,label){const payload={source:'POS',module:'POS',target:'PAY',type:'income',typeLabel:'Recette',amount:Number(amount)||0,currency:'XOF',channel:channelLabel(channel),who:'MON COMMERCE POS',category:label||'Clôture caisse POS',note:label+' · '+noteTotal(),proofRef:(closure.closureRef||'POS-CLOTURE')+'-'+channel+'-'+Date.now(),status:'draft',requiresHumanValidation:true,createdAt:new Date().toISOString(),safety:{posKeepsTickets:true,payKeepsFinalMoney:true,noAutoPayment:true,humanValidationRequired:true}};try{localStorage.setItem('DIGIY_POS_PAY_BRIDGE',JSON.stringify(payload));localStorage.setItem('DIGIY_PAY_PENDING_MOVEMENT',JSON.stringify(payload));localStorage.setItem('DIGIY_POS_LATEST_ACTION',JSON.stringify(payload))}catch(e){}return payload}
function send(amount,channel,label){if(!amount||amount<=0){set('Montant nul pour '+label+'.');return}saveLocal(amount,channel,label);set('Ouverture PAY pour '+label+'…');location.href=buildUrl(amount,channel,label)}
function render(){ $('dateBox').textContent=closure.date; $('totalBox').textContent=money(closure.total); $('noteBox').value=noteTotal(); $('rowsBox').innerHTML=modes.map(([label,key,value])=>'<div class="row"><div><strong>'+label+'</strong><span>Clôture POS · '+closure.date+'</span></div><div><div class="amount">'+money(value)+'</div><button class="btn" type="button" data-mode="'+key+'">Envoyer '+label+'</button></div></div>').join(''); document.querySelectorAll('[data-mode]').forEach(btn=>btn.onclick=()=>{const found=modes.find(x=>x[1]===btn.dataset.mode);if(found)send(found[2],found[1],'Clôture POS '+found[0])}); }
$('sendTotal').onclick=()=>send(closure.total,'other','Clôture caisse POS');
$('copy').onclick=async()=>{try{await navigator.clipboard.writeText($('noteBox').value);set('Clôture copiée.')}catch(e){prompt('Copie la clôture :',$('noteBox').value)}};
render();
})();
</script>
</body>
</html>
