  <style>
    :root{--bg:#1e293b;--bg2:#334155;--line:rgba(148,163,184,.20);--ink:#f9fafb;--muted:#94a3b8;--gold:#facc15;--green:#22c55e;--red:#ef4444}

    .key:hover{background:rgba(255,255,255,.08);border-color:rgba(250,204,21,.25)}

    .btn{width:100%;min-height:52px;border-radius:16px;border:1px solid rgba(250,204,21,.35);background:linear-gradient(135deg,rgba(250,204,21,.22),rgba(34,197,94,.18));color:#fff;font-size:1rem;font-weight:1100;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .10s,background .15s;touch-action:manipulation}
    .btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(250,204,21,.32),rgba(34,197,94,.26))}
    .btn:active:not(:disabled){transform:scale(.98)}
    .btn:disabled{opacity:.40;cursor:not-allowed}
    .status{margin-top:12px;min-height:0;padding:0;border-radius:12px;font-size:.84rem;font-weight:900;line-height:1.5;display:none;white-space:pre-wrap}

    .status.err{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.30);color:#fca5a5}
    .status.ok{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.30);color:#86efac}
    .status.spin{background:rgba(148,163,184,.07);border:1px solid var(--line);color:var(--muted)}
    .note{margin-top:18px;text-align:center;color:rgba(148,163,184,.55);font-size:.74rem;font-weight:800;line-height:1.55}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    .shake{animation:shake .35s ease}

<script>
(function(){
"use strict";

/*
  DIGIY PIN — MON COMMERCE / POS
  Correction 2026-05-23 :
  - Module principal POS
  - Alias acceptés : POS / POS_PRO / COMMERCE / CAISSE / MON_COMMERCE
  - Session écrite aussi dans DIGIY_POS_PRO_SESSION_V1 pour parler avec guard.js
  - Pas de téléphone exposé dans l'URL après validation
*/

const MODULE = String(window.DIGIY_MODULE || "POS").toUpperCase();
const MODULE_ALIASES = Array.from(new Set(
  [MODULE].concat(window.DIGIY_MODULE_ALIASES || ["POS","POS_PRO","COMMERCE","CAISSE","MON_COMMERCE"])
    .map(x => String(x || "").toUpperCase().trim())
    .filter(Boolean)
));
const MODULE_LABEL = window.DIGIY_MODULE_LABEL || "Mon commerce";
const MODULE_ICON  = window.DIGIY_MODULE_ICON || "💰";
const INDEX_URL    = window.DIGIY_INDEX_URL || "./index.html";
const SLUG_PREFIX  = String(window.DIGIY_SLUG_PREFIX || "pos").replace(/_/g,"-").toLowerCase();
const MAX_AGE      = 8 * 60 * 60 * 1000;

const mod = MODULE.toLowerCase();
const SESSION_KEYS = Array.from(new Set([
  `digiy_${mod}_session`,
  `digiy_${mod}_guard_session`,
  `digiy_guard_${mod}_session`,
  "DIGIY_POS_PRO_SESSION_V1",
  "digiy_pos_session",
  "digiy_pos_guard_session",
  "digiy_guard_pos_session",
  "digiy_caisse_session",
  "digiy_caisse_guard_session",
  "digiy_guard_caisse_session"
]));

const PHONE_KEYS = Array.from(new Set([
  `digiy_${mod}_phone`,
  `digiy_${mod}_last_phone`,
  "digiy_pos_phone",
  "digiy_pos_last_phone",
  "DIGIY_POS_HUB_PHONE",
  "digiy_caisse_phone",
  "digiy_caisse_last_phone",
  "digiy_phone"
]));

const SLUG_KEYS = Array.from(new Set([
  `digiy_${mod}_last_slug`,
  `digiy_${mod}_slug`,
  "digiy_pos_last_slug",
  "digiy_pos_slug",
  "digiy_caisse_last_slug",
  "digiy_caisse_slug",
  "digiy_last_slug",
  "digiy_slug"
]));

const $ = id => document.getElementById(id);
$("moduleLabel").textContent = MODULE_LABEL;
$("moduleIcon").textContent = MODULE_ICON;
document.title = `Accès ${MODULE_LABEL} • DIGIY`;

let pin = "";
let confirmedPhone = "";
let isLogging = false;

function normPhone(p){
  const d = String(p || "").replace(/\D/g,"");
  if(!d) return "";
  if(d.length === 9) return "221" + d;
  return d;
}
function fmt(d){
  d = String(d || "");
  if(d.length === 12 && d.startsWith("221")){
    return `${d.slice(0,3)} ${d.slice(3,5)} ${d.slice(5,8)} ${d.slice(8,10)} ${d.slice(10)}`;
  }
  return d;
}
function cleanSlug(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-z0-9-_]/g,"")
    .replace(/-+/g,"-")
    .replace(/^[-_]+|[-_]+$/g,"");
}
function fallbackSlug(phone){
  return SLUG_PREFIX && phone ? `${SLUG_PREFIX}-${phone}` : "";
}
function qp(n){
  try{return new URL(location.href).searchParams.get(n) || "";}catch(_){return "";}
}
function ls(k,v){
  try{
    if(v === undefined) return localStorage.getItem(k) || "";
    localStorage.setItem(k, v);
  }catch(_){}
}
function ss(k,v){
  try{
    if(v === undefined) return sessionStorage.getItem(k) || "";
    sessionStorage.setItem(k, v);
  }catch(_){}
}
function showSt(id,msg,cls){
  const e = $(id);
  if(!e) return;
  e.className = "status show " + cls;
  e.textContent = msg;
}
function clearSt(id){
  const e = $(id);
  if(!e) return;
  e.className = "status";
  e.textContent = "";
}
function shake(el){
  if(!el) return;
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");
  setTimeout(()=>el.classList.remove("shake"),400);
}
function cleanUrlAfterPrefill(){
  try{
    const u = new URL(location.href);
    let changed = false;
    ["phone","tel","owner_phone","slug","pin","code","session"].forEach(k=>{
      if(u.searchParams.has(k)){u.searchParams.delete(k);changed=true;}
    });
    if(changed){
      const clean = u.pathname + (u.searchParams.toString() ? "?" + u.searchParams.toString() : "") + u.hash;
      history.replaceState({}, document.title, clean);
    }
  }catch(_){}
}

function getSb(){
  if(window._dsb) return window._dsb;
  const url = window.DIGIY_SUPABASE_URL || "";
  const key = window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON || "";
  if(!url || !key) throw new Error("Supabase non configuré");
  if(!window.supabase || !window.supabase.createClient) throw new Error("Librairie Supabase absente");
  window._dsb = window.supabase.createClient(url, key, {
    auth:{persistSession:false, autoRefreshToken:false, detectSessionInUrl:false},
    global:{headers:{"x-digiy-module":MODULE}}
  });
  return window._dsb;
}

async function tryRpc(name, payloads){
  const sb = getSb();
  for(const payload of payloads){
    try{
      const {data,error} = await sb.rpc(name, payload);
      if(error) continue;
      return {ok:true,data,payload};
    }catch(_){}
  }
  return {ok:false,data:null};
}

function parseVerify(data, fallbackPhone){
  let row = Array.isArray(data) ? data[0] : data;

  if(row === true){
    return {ok:true, phone:normPhone(fallbackPhone), slug:"", session_token:""};
  }

  if(typeof row === "string"){
    const txt = row.trim();

    if(txt === "true" || txt === "t" || txt === "1" || txt.toLowerCase() === "ok"){
      return {ok:true, phone:normPhone(fallbackPhone), slug:"", session_token:""};
    }

    if(txt.startsWith("(") && txt.endsWith(")")){
      const parts = txt.slice(1,-1).split(",");
      const first = String(parts[0] || "").trim().toLowerCase();
      if(first === "t" || first === "true" || first === "1"){
        return {
          ok:true,
          phone:normPhone(parts[2] || fallbackPhone),
          slug:cleanSlug(parts[1] || ""),
          session_token:""
        };
      }
    }

    try{ row = JSON.parse(txt); }catch(_){ return null; }
  }

  if(row && typeof row === "object"){
    const ok =
      row.ok === true ||
      row.success === true ||
      row.valid === true ||
      row.is_valid === true ||
      row.allowed === true ||
      row.access === true ||
      row.access_ok === true ||
      row.status === "ok" ||
      row.status === "active";

    if(ok){
      return {
        ok:true,
        phone:normPhone(row.phone || row.p_phone || row.owner_phone || fallbackPhone),
        slug:cleanSlug(row.slug || row.identifiant || row.pos_slug || row.owner_slug || ""),
        session_token:row.session_token || row.token || ""
      };
    }

    const vals = Object.values(row);
    if(vals.some(v => v === true || v === 1 || v === "t" || v === "true")){
      return {
        ok:true,
        phone:normPhone(row.phone || row.p_phone || row.owner_phone || fallbackPhone),
        slug:cleanSlug(row.slug || row.identifiant || row.pos_slug || ""),
        session_token:row.session_token || ""
      };
    }
  }

  return null;
}

function buildVerifyPayloads(phone, pinCode){
  const cleanPhone = normPhone(phone);
  const cleanPin = String(pinCode || "").trim();

  const payloads = [];
  MODULE_ALIASES.forEach(moduleCode=>{
    payloads.push({p_phone:cleanPhone, p_module:moduleCode, p_pin:cleanPin});
    payloads.push({phone:cleanPhone, module:moduleCode, pin:cleanPin});
    payloads.push({input_phone:cleanPhone, input_module:moduleCode, input_pin:cleanPin});
  });

  return payloads;
}

async function verifyPin(phone, pinCode){
  const cleanPhone = normPhone(phone);
  const cleanPin = String(pinCode || "").trim().replace(/\s+/g,"");

  if(!cleanPhone || !cleanPin){
    return {ok:false, message:"Téléphone ou code manquant."};
  }

  /* 1) RPC métier POS si elle existe */
  const posRes = await tryRpc("digiy_pos_verify_pin", [
    {p_phone:cleanPhone, p_pin:cleanPin},
    {phone:cleanPhone, pin:cleanPin},
    {input_phone:cleanPhone, input_pin:cleanPin}
  ]);

  let parsed = posRes.ok ? parseVerify(posRes.data, cleanPhone) : null;
  if(parsed && parsed.ok) return parsed;

  /* 2) RPC générale avec tous les noms historiques du module */
  const genericRes = await tryRpc("digiy_verify_pin", buildVerifyPayloads(cleanPhone, cleanPin));
  parsed = genericRes.ok ? parseVerify(genericRes.data, cleanPhone) : null;
  if(parsed && parsed.ok) return parsed;

  return {ok:false, message:"Code incorrect ou accès Mon commerce non actif."};
}

function writeSession(phone, sl, token){
  const now = Date.now();
  const cleanPhone = normPhone(phone);
  const clean = {
    slug: cleanSlug(sl || ""),
    phone: cleanPhone,
    module: MODULE,
    public_name: MODULE_LABEL,
    role: "owner",
    validated_at: now,
    expires_at: now + MAX_AGE,
    session_token: token || "",
    access: true,
    access_ok: true
  };

  const raw = JSON.stringify(clean);

  SESSION_KEYS.forEach(k => { ls(k, raw); ss(k, raw); });
  PHONE_KEYS.forEach(k => { ls(k, cleanPhone); ss(k, cleanPhone); });

  if(clean.slug){
    SLUG_KEYS.forEach(k => { ls(k, clean.slug); ss(k, clean.slug); });
    try{
      const m = JSON.parse(ls("digiy_module_slugs") || "{}") || {};
      MODULE_ALIASES.forEach(a => m[a] = clean.slug);
      m[MODULE] = clean.slug;
      ls("digiy_module_slugs", JSON.stringify(m));
    }catch(_){}
  }

  try{
    window.DIGIY_POS_HUB_PHONE = cleanPhone;
    window.DIGIY_ACCESS = Object.assign({}, window.DIGIY_ACCESS || {}, clean);
  }catch(_){}

  return clean;
}

function redirectClean(){
  /* La session locale porte l'identité. On n'expose pas le téléphone dans l'URL. */
  try{
    const u = new URL(INDEX_URL, location.href);
    ["phone","tel","owner_phone","slug","pin","code","session"].forEach(k=>u.searchParams.delete(k));
    location.replace(u.toString());
  }catch(_){
    location.replace(INDEX_URL);
  }
}

/* Pré-remplissage discret si un ancien lien arrive avec ?phone= */
(function prefill(){
  const fromUrl = normPhone(qp("phone") || qp("tel") || qp("owner_phone"));
  const fromStorage = normPhone(
    ss("digiy_pos_phone") ||
    ls("digiy_pos_phone") ||
    ss("digiy_caisse_phone") ||
    ls("digiy_caisse_phone") ||
    ls("digiy_phone")
  );
  const value = fromUrl || fromStorage;
  if(value){
    const phoneEl = $("phoneInput");
    if(phoneEl){
      phoneEl.value = value;
    }
  }
  cleanUrlAfterPrefill();
})();

/* ETAPE 1 */
const phoneEl = $("phoneInput");
const btnContinue = $("btnContinue");

function updateContinueBtn(){
  btnContinue.disabled = normPhone(phoneEl.value).length < 9;
}
phoneEl.addEventListener("input",()=>{
  clearSt("status1");
  phoneEl.classList.remove("err-field");
  updateContinueBtn();
});
phoneEl.addEventListener("keydown",e=>{
  if(e.key === "Enter" && !btnContinue.disabled) goStep2();
});
updateContinueBtn();

async function goStep2(){
  const raw = normPhone(phoneEl.value);
  if(raw.length < 9){
    phoneEl.classList.add("err-field");
    showSt("status1","❌ Numéro trop court.\nFormat attendu : 221 77 XXX XX XX","err");
    shake(phoneEl);
    return;
  }
  btnContinue.disabled = true;
  clearSt("status1");
  confirmedPhone = raw;
  showStep2();
}
btnContinue.addEventListener("click",goStep2);

/* ETAPE 2 */
function showStep2(){
  $("step1").classList.remove("active");
  $("step2").classList.add("active");

  $("dot1").className = "step-dot done";
  $("dot1").textContent = "✓";
  $("lbl1").className = "step-lbl";

  $("dot2").className = "step-dot active";
  $("lbl2").className = "step-lbl active";
  $("conn").classList.add("done");

  $("phoneDisplay").textContent = fmt(confirmedPhone);
  pin = "";
  updateDots();
  updateEnterBtn();
}
function goStep1(){
  $("step2").classList.remove("active");
  $("step1").classList.add("active");

  $("dot1").className = "step-dot active";
  $("dot1").textContent = "1";
  $("lbl1").className = "step-lbl active";

  $("dot2").className = "step-dot";
  $("lbl2").className = "step-lbl";
  $("conn").classList.remove("done");

  pin = "";
  clearSt("status2");
  btnContinue.disabled = false;
  updateDots();
  updateEnterBtn();
}
$("btnBack").addEventListener("click",goStep1);

function updateDots(){
  for(let i=0;i<4;i++){
    const d = $("d"+i);
    d.classList.toggle("filled", i < pin.length);
    d.classList.remove("err");
  }
}
function updateEnterBtn(){
  $("btnEnter").disabled = pin.length !== 4 || isLogging;
}

$("keypad").addEventListener("click",e=>{
  const key = e.target.closest("[data-v]");
  if(!key || isLogging) return;
  const v = key.dataset.v;
  if(v === "DEL"){
    pin = pin.slice(0,-1);
  }else if(pin.length < 4){
    pin += v;
    if(pin.length === 4) setTimeout(doLogin,120);
  }
  updateDots();
  updateEnterBtn();
  clearSt("status2");
});

document.addEventListener("keydown",e=>{
  if(document.activeElement === phoneEl) return;
  if(!$("step2").classList.contains("active")) return;
  if(isLogging) return;

  if(/^[0-9]$/.test(e.key) && pin.length < 4){
    pin += e.key;
    updateDots();
    updateEnterBtn();
    if(pin.length === 4) setTimeout(doLogin,120);
  }else if(e.key === "Backspace"){
    pin = pin.slice(0,-1);
    updateDots();
    updateEnterBtn();
  }
});

$("btnEnter").addEventListener("click",doLogin);

async function doLogin(){
  if(isLogging || pin.length !== 4) return;

  isLogging = true;
  updateEnterBtn();
  showSt("status2","⏳ Vérification du code…","spin");

  try{
    const res = await verifyPin(confirmedPhone, pin);

    if(!res.ok){
      pin = "";
      isLogging = false;
      updateDots();
      updateEnterBtn();
      for(let i=0;i<4;i++) $("d"+i).classList.add("err");
      shake($("pinDots"));
      showSt("status2","❌ " + (res.message || "Code incorrect.") + "\nVérifie tes 4 chiffres et réessaie.","err");
      return;
    }

    const finalPhone = normPhone(res.phone || confirmedPhone);
    const finalSlug = cleanSlug(res.slug || "") || fallbackSlug(finalPhone);

    writeSession(finalPhone, finalSlug, res.session_token || "");
    showSt("status2","✅ Accès ouvert. Redirection…","ok");
    setTimeout(redirectClean,700);
  }catch(err){
    pin = "";
    isLogging = false;
    updateDots();
    updateEnterBtn();
    showSt("status2","❌ Erreur : " + (err && err.message ? err.message : "inattendue."),"err");
  }
}
})();
</script>
