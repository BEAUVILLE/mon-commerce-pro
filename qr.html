<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#06140f"/>
  <title>MON COMMERCE — Mon QR</title>

  <script>
    window.DIGIY_MODULE = "POS";
    window.DIGIY_LOGIN_URL = "./pin.html";
  </script>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --bg:#04110d;
      --text:#f7fbf8;
      --muted:#b8cfc4;
      --gold:#facc15;
      --gold2:#f59e0b;
      --green:#22c55e;
      --blue:#38bdf8;
      --line:rgba(255,255,255,.12);
      --shadow:0 22px 62px rgba(0,0,0,.38);
      --font:"Outfit",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --bottom:88px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}

    body{
      min-height:100dvh;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(850px 520px at 0% -10%, rgba(250,204,21,.13), transparent 58%),
        radial-gradient(800px 480px at 100% 0%, rgba(34,197,94,.13), transparent 58%),
        linear-gradient(180deg,#06140f,var(--bg));
      padding:12px 12px calc(var(--bottom) + env(safe-area-inset-bottom,0px) + 16px);
    }

    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{cursor:pointer}

    .wrap{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 390px;
      gap:12px;
      align-items:start;
    }

    .card{
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));
      box-shadow:var(--shadow);
      padding:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo{
      width:58px;
      height:58px;
      border-radius:22px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#06140f;
      font-size:29px;
      font-weight:1000;
    }

    h1{
      margin:0;
      font-size:clamp(1.8rem,6vw,2.75rem);
      line-height:.96;
      letter-spacing:-.05em;
      font-weight:1000;
    }

    .sub{
      margin-top:7px;
      color:var(--muted);
      line-height:1.42;
      font-size:1rem;
      font-weight:850;
    }

    .notice{
      margin-top:12px;
      border-radius:20px;
      padding:12px;
      line-height:1.45;
      font-size:.92rem;
      font-weight:850;
      background:rgba(250,204,21,.08);
      border:1px solid rgba(250,204,21,.25);
      color:#fde68a;
    }

    .notice.ok{
      background:rgba(34,197,94,.10);
      border-color:rgba(34,197,94,.28);
      color:#bbf7d0;
    }

    .notice.err{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.28);
      color:#fecaca;
    }

    .form{
      margin-top:14px;
      display:grid;
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    label{
      font-size:.95rem;
      font-weight:1000;
      color:#eafff1;
    }

    input,select{
      width:100%;
      min-height:56px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.05);
      color:var(--text);
      outline:none;
      padding:12px 14px;
      font-size:1.02rem;
      font-weight:900;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      min-height:58px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px;
      font-size:.98rem;
      font-weight:1000;
      text-align:center;
    }

    .btn.primary{
      border:none;
      color:#06140f;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
    }

    .btn.green{
      border:none;
      color:#06140f;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .btn.blue{
      color:#bae6fd;
      background:rgba(56,189,248,.12);
      border-color:rgba(56,189,248,.25);
    }

    .wide{grid-column:1/-1}

    .qrCard{
      background:#fff;
      color:#0f172a;
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .qrBox{
      border-radius:22px;
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
    }

    #qrCanvas{
      width:min(100%,300px);
      height:auto;
      display:block;
    }

    .qrTitle{
      margin-top:14px;
      text-align:center;
      font-size:1.75rem;
      font-weight:1000;
      color:#0f172a;
    }

    .qrInfo{
      margin-top:7px;
      text-align:center;
      font-size:.88rem;
      color:#475569;
      font-weight:900;
    }

    .urlBox{
      margin-top:12px;
      border-radius:18px;
      padding:12px;
      background:rgba(0,0,0,.16);
      color:var(--muted);
      font-size:.80rem;
      font-weight:800;
      word-break:break-all;
    }

    @media(max-width:860px){
      .wrap{grid-template-columns:1fr}
    }

    @media(max-width:560px){
      .actions{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="wrap">

  <section class="card">

    <div class="brand">
      <div class="logo">🔳</div>

      <div>
        <h1>Mon QR boutique</h1>

        <div class="sub">
          QR public simple vers la fiche boutique.
        </div>
      </div>
    </div>

    <div class="notice" id="statusBox">
      Prépare ton QR.
    </div>

    <div class="form">

      <div class="field">
        <label for="shopName">Nom boutique</label>
        <input id="shopName" placeholder="Ex : Astou Boutique"/>
      </div>

      <div class="field">
        <label for="slug">Identifiant boutique</label>
        <input id="slug" placeholder="commerce-xxxx"/>
      </div>

    </div>

    <div class="actions">

      <button class="btn primary" id="btnGenerate">
        ⚙️ Générer
      </button>

      <button class="btn blue" id="btnCopy">
        📋 Copier lien
      </button>

      <button class="btn green" id="btnOpen">
        🚪 Ouvrir
      </button>

      <button class="btn wide" id="btnPrint">
        🖨️ Imprimer
      </button>

    </div>

    <div class="urlBox" id="urlBox">
      Lien : —
    </div>

  </section>

  <aside class="qrCard">

    <div class="qrBox">
      <canvas id="qrCanvas" width="320" height="320"></canvas>
    </div>

    <div class="qrTitle" id="qrTitle">
      MON COMMERCE
    </div>

    <div class="qrInfo">
      Scanner pour ouvrir la fiche boutique.
    </div>

  </aside>

</div>

<script>
(function(){

  "use strict";

  const $ = (id)=>document.getElementById(id);

  function normSlug(v){
    return String(v || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g,"-")
      .replace(/[^a-z0-9-]/g,"")
      .replace(/-+/g,"-")
      .replace(/^-|-$/g,"");
  }

  function currentSlug(){
    return normSlug($("slug").value);
  }

  function currentName(){
    return $("shopName").value.trim() || "MON COMMERCE";
  }

  function localUrl(path){
    return location.origin + location.pathname.replace("qr.html", path);
  }

  function buildTarget(){

    const slug = currentSlug();

    const u = new URL(localUrl("fiche.html"));

    if(slug){
      u.searchParams.set("commerce", slug);
    }

    return u.toString();
  }

  function setStatus(msg,type){

    const box = $("statusBox");

    box.className = "notice " + (type || "");
    box.textContent = msg;
  }

  async function generate(){

    const target = buildTarget();
    const slug = currentSlug();

    $("qrTitle").textContent = currentName();

    $("urlBox").textContent = "Lien : " + target;

    if(!window.QRCode || typeof window.QRCode.toCanvas !== "function"){

      const imgUrl =
        "https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=" +
        encodeURIComponent(target);

      const ctx = $("qrCanvas").getContext("2d");

      const img = new Image();

      img.crossOrigin = "anonymous";

      img.onload = function(){

        ctx.clearRect(0,0,320,320);

        ctx.drawImage(img,0,0,320,320);

        setStatus(
          slug
            ? "QR prêt vers la fiche boutique."
            : "QR prêt, mais identifiant boutique manquant.",
          slug ? "ok" : ""
        );
      };

      img.onerror = function(){

        setStatus(
          "Générateur QR indisponible. Vérifie la connexion puis recharge.",
          "err"
        );
      };

      img.src = imgUrl;

      return;
    }

    try{

      await window.QRCode.toCanvas(
        $("qrCanvas"),
        target,
        {
          width:320,
          margin:2,
          errorCorrectionLevel:"H",
          color:{
            dark:"#0f172a",
            light:"#ffffff"
          }
        }
      );

      setStatus(
        slug
          ? "QR prêt vers la fiche boutique."
          : "QR prêt, mais identifiant boutique manquant.",
        slug ? "ok" : ""
      );

    }catch(err){

      console.error(err);

      setStatus(
        "Impossible de générer le QR.",
        "err"
      );
    }
  }

  async function copyLink(){

    try{

      await navigator.clipboard.writeText(buildTarget());

      setStatus("Lien copié ✅","ok");

    }catch(_){

      setStatus("Copie impossible.","err");
    }
  }

  function openTarget(){
    window.open(buildTarget(),"_blank");
  }

  function bind(){

    $("btnGenerate").addEventListener("click",generate);

    $("btnCopy").addEventListener("click",copyLink);

    $("btnOpen").addEventListener("click",openTarget);

    $("btnPrint").addEventListener("click",()=>window.print());

    $("shopName").addEventListener("input",generate);

    $("slug").addEventListener("input",function(){

      $("slug").value = normSlug($("slug").value);

      generate();
    });
  }

  function boot(){

    const slug =
      localStorage.getItem("digiy_pos_slug") ||
      localStorage.getItem("digiy_pos_last_slug") ||
      "";

    const name =
      localStorage.getItem("caisse_shop") ||
      "MON COMMERCE";

    $("slug").value = slug;

    $("shopName").value = name;

    bind();

    generate();
  }

  boot();

})();
</script>

</body>
</html>
