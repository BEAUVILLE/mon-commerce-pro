<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#06140f"/>
  <title>MON COMMERCE — QR Astou Boutique</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --bg:#04110d;
      --text:#f7fbf8;
      --muted:#b8cfc4;
      --gold:#facc15;
      --gold2:#f59e0b;
      --green:#22c55e;
      --blue:#38bdf8;
      --line:rgba(255,255,255,.12);
      --shadow:0 22px 62px rgba(0,0,0,.38);
      --font:"Outfit",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}

    body{
      min-height:100dvh;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(850px 520px at 0% -10%, rgba(250,204,21,.13), transparent 58%),
        radial-gradient(800px 480px at 100% 0%, rgba(34,197,94,.13), transparent 58%),
        linear-gradient(180deg,#06140f,var(--bg));
      padding:14px;
    }

    a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer}

    .wrap{
      max-width:760px;
      margin:0 auto;
      display:grid;
      gap:14px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));
      box-shadow:var(--shadow);
      padding:20px;
      text-align:center;
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:26px;
      display:grid;
      place-items:center;
      margin:0 auto 14px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#06140f;
      font-size:34px;
      font-weight:1000;
    }

    h1{
      margin:0;
      font-size:clamp(2rem,7vw,3.4rem);
      line-height:.95;
      letter-spacing:-.05em;
      font-weight:1000;
    }

    .sub{
      margin:12px auto 0;
      max-width:520px;
      color:var(--muted);
      line-height:1.5;
      font-size:1rem;
      font-weight:850;
    }

    .notice{
      margin-top:14px;
      border-radius:20px;
      padding:12px;
      background:rgba(250,204,21,.08);
      border:1px solid rgba(250,204,21,.25);
      color:#fde68a;
      line-height:1.45;
      font-weight:850;
    }

    .notice.ok{
      background:rgba(34,197,94,.10);
      border-color:rgba(34,197,94,.28);
      color:#bbf7d0;
    }

    .notice.err{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.28);
      color:#fecaca;
    }

    .qrCard{
      background:#fff;
      color:#0f172a;
      border-radius:30px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    .qrBox{
      border-radius:24px;
      padding:14px;
      display:grid;
      place-items:center;
      background:#fff;
    }

    #qrCanvas{
      width:min(100%,320px);
      height:auto;
      display:block;
    }

    .qrTitle{
      margin-top:14px;
      font-size:1.8rem;
      font-weight:1000;
      color:#0f172a;
      text-align:center;
    }

    .qrInfo{
      margin-top:7px;
      color:#475569;
      font-size:.92rem;
      font-weight:900;
      text-align:center;
    }

    .urlBox{
      margin-top:14px;
      border-radius:18px;
      padding:12px;
      background:rgba(0,0,0,.18);
      color:var(--muted);
      font-size:.82rem;
      font-weight:800;
      word-break:break-all;
      text-align:left;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      min-height:58px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px;
      font-size:.98rem;
      font-weight:1000;
      text-align:center;
    }

    .btn.primary{
      border:none;
      color:#06140f;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
    }

    .btn.green{
      border:none;
      color:#06140f;
      background:linear-gradient(135deg,#22c55e,#16a34a);
    }

    .btn.blue{
      color:#bae6fd;
      background:rgba(56,189,248,.12);
      border-color:rgba(56,189,248,.25);
    }

    .wide{grid-column:1/-1}

    @media(max-width:560px){
      .actions{grid-template-columns:1fr}
      .card,.qrCard{border-radius:25px}
    }

    @media print{
      body{background:#fff;padding:0}
      .card:first-child{display:none!important}
      .wrap{max-width:none;margin:0;padding:0}
      .qrCard{
        box-shadow:none;
        border-radius:0;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
      }
    }
  </style>
</head>

<body>

<main class="wrap">

  <section class="card">
    <div class="logo">🔳</div>

    <h1>QR Astou Boutique</h1>

    <div class="sub">
      Ce QR ouvre directement la fiche publique Astou Boutique.
      Zéro détour, zéro Supabase côté client.
    </div>

    <div class="notice" id="statusBox">
      Préparation du QR…
    </div>

    <div class="actions">
      <button class="btn primary" id="btnGenerate" type="button">⚙️ Générer</button>
      <button class="btn blue" id="btnCopy" type="button">📋 Copier lien</button>
      <button class="btn green" id="btnOpen" type="button">🚪 Ouvrir fiche</button>
      <button class="btn wide" id="btnPrint" type="button">🖨️ Imprimer</button>
    </div>

    <div class="urlBox" id="urlBox">Lien : —</div>
  </section>

  <section class="qrCard">
    <div class="qrBox">
      <canvas id="qrCanvas" width="320" height="320"></canvas>
    </div>

    <div class="qrTitle">Astou Boutique</div>
    <div class="qrInfo">Scanner pour ouvrir la fiche publique.</div>
  </section>

</main>

<script>
(function(){
  "use strict";

 const TARGET = location.origin + location.pathname.replace(/qr\.html$/i, "fiche-astou.html");
  const $ = (id)=>document.getElementById(id);

  function setStatus(msg,type){
    const box = $("statusBox");
    box.className = "notice " + (type || "");
    box.textContent = msg;
  }

  async function generate(){
    $("urlBox").textContent = "Lien : " + TARGET;

    if(window.QRCode && typeof window.QRCode.toCanvas === "function"){
      try{
        await window.QRCode.toCanvas(
          $("qrCanvas"),
          TARGET,
          {
            width:320,
            margin:2,
            errorCorrectionLevel:"H",
            color:{
              dark:"#0f172a",
              light:"#ffffff"
            }
          }
        );
        setStatus("QR prêt vers fiche-astou.html ✅","ok");
        return;
      }catch(err){
        console.error(err);
      }
    }

    try{
      const imgUrl =
        "https://quickchart.io/qr?size=320&text=" +
        encodeURIComponent(TARGET);

      const ctx = $("qrCanvas").getContext("2d");
      const img = new Image();

      img.crossOrigin = "anonymous";

      img.onload = function(){
        ctx.clearRect(0,0,320,320);
        ctx.drawImage(img,0,0,320,320);
        setStatus("QR prêt vers fiche-astou.html ✅","ok");
      };

      img.onerror = function(){
        setStatus("QR indisponible. Le lien reste copiable ci-dessous.","err");
      };

      img.src = imgUrl;
    }catch(_){
      setStatus("QR indisponible. Le lien reste copiable ci-dessous.","err");
    }
  }

  async function copyLink(){
    try{
      await navigator.clipboard.writeText(TARGET);
      setStatus("Lien copié ✅","ok");
    }catch(_){
      setStatus("Copie impossible sur ce navigateur.","err");
    }
  }

  function openTarget(){
    window.open(TARGET,"_blank","noopener,noreferrer");
  }

  function bind(){
    $("btnGenerate").addEventListener("click",generate);
    $("btnCopy").addEventListener("click",copyLink);
    $("btnOpen").addEventListener("click",openTarget);
    $("btnPrint").addEventListener("click",()=>window.print());
  }

  bind();
  generate();

})();
</script>

</body>
</html>
